# 项目相关配置
ruoyi:
  # 名称
  name: GeoApplicationServer
  # 版本
  version: 3.9.1
  # 版权年份
  copyrightYear: 2026
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: D:/ruoyi/uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: none
  versionLogs:
    - { version-code: 24051701,version-name: 1.0.0,version-desc: 新增背景颜色参数 }
    - { version-code: 24051702,version-name: 1.0.1,version-desc: 允许工作面新增其他巷道（只加载模型，暂不应用其他业务） }
    - { version-code: 24082601,version-name: 1.0.2,version-desc: 支撑v0.1地质软件（不支持自定义工作面区域） }
    - { version-code: 24120201,version-name: 1.0.3,version-desc: 增加工作面信息导出功能 }
    - { version-code: 25040701,version-name: 1.0.4,version-desc: 增加工作面属性模型接口 }
    - { version-code: 25040801,version-name: 1.0.5,version-desc: 增加解析地应力功能 }
    - { version-code: 25042401,version-name: 1.0.6,version-desc: 1.增加钻孔绑定属性数据；2.增加掘进工作面相关类 }
    - { version-code: 25060101,version-name: 1.0.7,version-desc: 1.增加程序版本与数据库版本绑定升级机制，设定为后台init版本(之前的版本都会被定义到当前版本) }
    - { version-code: 25102201,version-name: 1.0.8,version-desc: 1.增加自定义风险区域管理；2.增加项目文档管理(实现在web前端)；3.增加采煤工作(采面)信息管理；4.增加MySQL，SQLite双数据源支持；5.增加/versionLog接口标注后台服务版本；6.接口中增加AI相关测试服务接口； }
    - { version-code: 25111801,version-name: 1.0.9,version-desc: 1.增加钻孔数据统计 }
    - { version-code: 25120101,version-name: 1.0.9.1,version-desc: 1.更新版本升级机制，支持非受控版本的后台，更新到受控版本(初始版本25060101，1.0.7) }
    - { version-code: 25121101,version-name: 1.0.9.2,version-desc: 1.更新数据导入导出功能 }
    - { version-code: 26012001,version-name: 1.0.9.3,version-desc: 1.增加采面验证孔类型；2.钻孔增加架号，采面ID字段；3.采面信息增加总平均进尺 }

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8989
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  config: classpath:logback.xml
  level:
    com.ruoyi: debug
    org.springframework: debug
    druid:
      sql:
        Statement: debug

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  jackson:
    default-property-inclusion: non_null
  mvc:
    view:
      suffix: .html
    static-path-pattern: /**
    resources:
      static-locations: classpath:/templates/,classpath:/static/
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 512MB
      # 设置总上传的文件大小
      max-request-size: 1024MB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: false
  # redis 配置
  redis:
    # 地址
    host: localhost
    # 端口，默认为6379
    port: 6379
    # 数据库索引
    database: 0
    # 密码
    password:
    # 连接超时时间
    timeout: 10s
    lettuce:
      pool:
        # 连接池中的最小空闲连接
        min-idle: 0
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池的最大数据库连接数
        max-active: 8
        # #连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
#mybatis:
#    # 搜索指定包别名
#    typeAliasesPackage: com.ruoyi.**.domain
#    # 配置mapper的扫描，找到所有的mapper.xml映射文件
#    mapperLocations: classpath*:mapper/**/*Mapper.xml
#    # 加载全局的配置文件
#    configLocation: classpath:mybatis/mybatis-config.xml

mybatis-plus:
  typeAliasesPackage: com.ruoyi.**.domain
    #mapper-locations: classpath*:mapper/**/*Mapper.xml
  #configuration:
  # 这个配置会将执行的sql打印出来，在开发或测试的时候可以用
  #    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  # 该配置就是将带有下划线的表字段映射为驼峰格式的实体类属性
  #    map-underscore-to-camel-case: true
  #如果查询结果中包含空值的列，则 MyBatis 在映射的时候，不会映射这个字段
  #call-setters-on-nulls: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  configuration:
    # 数据库类型识别（关键：让MyBatis-Plus知道当前数据库类型）
    #    database-id: sqlite  # 用驱动类名作为标识
    database-id: mysql
    cache-enabled: true
    use-generated-keys: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    default-executor-type: SIMPLE
  #type-aliases-package: com.ruoyi.**.domain,;com.d3code.**.domain
  #type-aliases-package: com.ruoyi.**.domain

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Swagger配置
swagger:
  # 是否开启swagger
  enabled: true
  # 请求前缀
  pathMapping: /dev-api

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1,ruoyi.vip,www.ruoyi.vip

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*
# minio配置
minio:
  endpoint: http://192.168.3.129:9000
  accessKey: u3duser
  secretKey: u3duserpassword
  bucketName: u3dres

